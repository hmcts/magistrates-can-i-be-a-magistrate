services:
  - type: web
    name: magistrates-can-i-be-a-magistrate
    runtime: node
    plan: free
    region: frankfurt
    rootDir: ui-hmcts-magistrates
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
